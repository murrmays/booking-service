<div class="table-container">
  <table class="custom-table">
    <thead>
      <tr>
        <th>Комната</th>
        <th>Дата</th>
        <th>Время</th>
        <th>Статус</th>
        <th>Действия</th>
      </tr>
    </thead>
    <tbody>
      @for (booking of bookings(); track booking.id) {
        <tr>
          <td class="font-bold">{{ booking.room.name}}</td>
          <td>{{ booking.date}}</td>
          <td>{{ booking.startTime }} — {{ booking.endTime }}</td>
          <td>
            <span class="status-badge" [class]="'status-' + booking.status">
              {{ booking.status }}
            </span>
          </td>
          <td>
            @if (booking.status === 'активна') {
              <button class="btn-cancel" (click)="cancelBooking(booking.id)">
                Отменить
              </button>
            } @else {
              <span class="text-muted">—</span>
            }
          </td>
        </tr>
      } @empty {
        <tr>
          <td colspan="5" class="empty-row">У вас пока нет бронирований</td>
        </tr>
      }
    </tbody>
  </table>
</div>
